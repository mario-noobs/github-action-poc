name: e2e

on:
  workflow_dispatch:
    inputs:
      portal_image:
        description: "ghcr.io/<owner>/user-portal-backend:<tag>"
        required: true
        type: string
      orchestrator_image:
        description: "ghcr.io/<owner>/orchestrator:<tag>"
        required: true
        type: string
      worker_image:
        description: "ghcr.io/<owner>/worker:<tag>"
        required: true
        type: string
      serverless_image:
        description: "ghcr.io/<owner>/serverless-functions:<tag>"
        required: true
        type: string
      e2e_runner_image:
        description: "ghcr.io/<owner>/e2e-tests:<tag>"
        required: false
        type: string
        default: ""

  workflow_call:
    inputs:
      portal_image:        { required: true, type: string }
      orchestrator_image:  { required: true, type: string }
      worker_image:        { required: true, type: string }
      serverless_image:    { required: true, type: string }
      e2e_runner_image:    { required: false, type: string, default: "" }
    secrets:
      LOCALSTACK_AUTH_TOKEN: { required: true }
      GHCR_TOKEN:            { required: false }
      PUMBLE_WEBHOOK_URL:    { required: false }

permissions:
  contents: read
  packages: read
  pages: write
  id-token: write

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PORTAL_IMAGE:            ${{ inputs.portal_image }}
      ORCHESTRATOR_IMAGE:      ${{ inputs.orchestrator_image }}
      WORKER_IMAGE:            ${{ inputs.worker_image }}
      SERVERLESS_IMAGE:        ${{ inputs.serverless_image }}
      JWT_SECRET:              e2e-jwt-secret-do-not-use-in-prod
      LOCALSTACK_AUTH_TOKEN:   ${{ secrets.LOCALSTACK_AUTH_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve e2e-runner image
        id: runner
        run: |
          if [ -n "${{ inputs.e2e_runner_image }}" ]; then
            echo "image=${{ inputs.e2e_runner_image }}" >> "$GITHUB_OUTPUT"
          else
            echo "image=ghcr.io/${{ github.repository }}/e2e-tests:latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Run e2e suite
        env:
          E2E_RUNNER_IMAGE: ${{ steps.runner.outputs.image }}
        run: ./scripts/run-e2e.sh

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: reports/html/
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload compose logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: compose-logs
          path: logs/
          if-no-files-found: ignore

  deploy-report:
    needs: e2e
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    outputs:
      page_url: ${{ steps.deploy.outputs.page_url }}
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Download Playwright report
        uses: actions/download-artifact@v4
        with:
          name: playwright-report
          path: playwright-report

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-report/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

  notify:
    needs: [e2e, deploy-report]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - name: Send Pumble notification
        env:
          PUMBLE_WEBHOOK_URL: ${{ secrets.PUMBLE_WEBHOOK_URL }}
          E2E_RESULT: ${{ needs.e2e.result }}
          REPORT_URL: ${{ needs.deploy-report.outputs.page_url }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$PUMBLE_WEBHOOK_URL" ]; then
            echo "PUMBLE_WEBHOOK_URL not set, skipping notification"
            exit 0
          fi

          if [ "$E2E_RESULT" = "success" ]; then
            ICON="✅"
            STATUS="passed"
          else
            ICON="❌"
            STATUS="failed ($E2E_RESULT)"
          fi

          REPORT_LINE=""
          if [ -n "$REPORT_URL" ]; then
            REPORT_LINE=" | [View report]($REPORT_URL)"
          fi

          curl -s -X POST "$PUMBLE_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"$ICON E2E tests **$STATUS** | [View run]($RUN_URL)$REPORT_LINE\"}"
