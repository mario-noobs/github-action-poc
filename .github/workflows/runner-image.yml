name: runner-image

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "Dockerfile"
      - "package.json"
      - "pnpm-lock.yaml"
      - "playwright.config.ts"
      - "tsconfig.json"
      - "tests/**"
      - "fixtures/**"
      - ".github/workflows/runner-image.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/e2e-tests
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  call-e2e:
    needs: build
    uses: ./.github/workflows/e2e.yml
    with:
      portal_image: ghcr.io/mario-noobs/gha-poc/portal:latest
      orchestrator_image: ghcr.io/mario-noobs/gha-poc/orchestrator:latest
      worker_image: ghcr.io/mario-noobs/gha-poc/worker:latest
      serverless_image: ghcr.io/mario-noobs/gha-poc/serverless-functions:latest
      e2e_runner_image: ghcr.io/${{ github.repository }}/e2e-tests:latest
    secrets:
      LOCALSTACK_AUTH_TOKEN: ${{ secrets.LOCALSTACK_AUTH_TOKEN }}
      GHCR_TOKEN:            ${{ secrets.GHCR_TOKEN }}
    permissions:
      contents: read
      packages: read
      pages: write
      id-token: write
